<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Manual Karyawan</title>
    <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body class="bg-gradient-to-b from-[#0a192f] to-[#0ea5e9] min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-md">
        <h3 class="text-xl font-bold text-gray-800 text-center mb-6">Login Username / Gmail</h3>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-600">Username atau Email Gmail</label>
                <input type="text" id="login_user" required class="mt-1 w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600">Password</label>
                <input type="password" id="login_pass" required class="mt-1 w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <button type="submit" id="btnLogin" class="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700 transition shadow-md">
                Masuk
            </button>
        </form>
        
        <div class="text-center mt-4">
            <a href="index.html" class="text-xs text-blue-600 hover:underline">← Kembali ke Pilihan Utama</a>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzL33sFcQMkdQHQGzBLl22aUFD8WwObfg1-PNo-MYiENjenvG2-QtnTpcgkVsMSrsff/exec";

        async function sha256(string) {
            const utf8 = new TextEncoder().encode(string);
            const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnLogin = document.getElementById('btnLogin');
            btnLogin.innerText = "Memverifikasi...";
            btnLogin.setAttribute('disabled', true);

            const userText = document.getElementById('login_user').value;
            const passText = document.getElementById('login_pass').value;
            const passHash = await sha256(passText);

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'login',
                        username_or_email: userText,
                        password_hash: passHash
                    })
                });
                const result = await response.json();

                if (result.status === "SUCCESS") {
                    // Simpan data login sementara ke dalam session storage browser
                    sessionStorage.setItem("isLoggedIn", "TRUE");
                    sessionStorage.setItem("userProfile", JSON.stringify(result.userData));
                    
                    alert("Login Berhasil! Selamat Datang " + result.userData.nama);
                    // Pindah arah langsung ke halaman dashboard utama (Akan kita buat di tahap selanjutnya)
                    window.location.href = "dashboard.html";
                } else if (result.status === "PENDING") {
                    window.location.href = "pending.html";
                } else {
                    alert(result.message);
                }
            } catch (error) {
                alert("Gangguan sistem masuk jaringan.");
            } finally {
                btnLogin.innerText = "Masuk";
                btnLogin.removeAttribute('disabled');
            }
        });
    </script>
</body>
</html>
