<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Masuk Karyawan</title>
    <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <!-- Contoh Tema "Vapor" yang bergaya Neon/Cyberpunk -->
    <script src="https://jsdelivr.net"></script>
    <!-- 
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    -->
    <style>
        #canvasBox {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #3b82f6;
            position: relative;
        }
        video { object-fit: cover; width: 100%; height: 100%; }
    </style>
</head>
<body class="bg-gradient-to-b from-[#0a192f] to-[#0ea5e9] min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-md flex flex-col items-center">
        <!-- Lingkaran Kamera Selalu di Atas -->
        <div id="canvasBox" class="bg-gray-200 mb-4 flex items-center justify-center">
            <video id="webcam" autoplay playsinline></video>
        </div>
        <p id="cameraStatus" class="text-xs text-gray-500 mb-6 text-center">Menyiapkan kamera untuk pengenalan wajah...</p>

        <!-- Pilihan Aksi -->
        <div class="w-full space-y-3">
            <button id="btnFaceLogin" class="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700 transition shadow-md">
                Masuk dengan Wajah
            </button>
            <div class="flex gap-2">
                <a href="login-manual.html" class="w-1/2 bg-gray-100 text-gray-700 p-2.5 rounded-lg text-sm font-medium hover:bg-gray-200 text-center transition border border-gray-200">
                    Login Manual
                </a>
                <a href="register.html" class="w-1/2 bg-gray-100 text-gray-700 p-2.5 rounded-lg text-sm font-medium hover:bg-gray-200 text-center transition border border-gray-200">
                    Daftar Akun
                </a>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const cameraStatus = document.getElementById('cameraStatus');

        async function jalankanKamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
                cameraStatus.innerText = "Kamera aktif. Hadapkan wajah ke kamera untuk login.";
            } catch (err) {
                cameraStatus.innerText = "Akses kamera gagal/ditolak.";
            }
        }
        window.addEventListener('DOMContentLoaded', jalankanKamera);

        document.getElementById('btnFaceLogin').addEventListener('click', () => {
            alert("Sistem AI Face Recognition dipersiapkan pada tahap berikutnya!");
        });
    </script>
</body>
</html>
