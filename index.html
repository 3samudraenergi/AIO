<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Masuk Karyawan - Biometrik</title>
    <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <!--
    <script src="https://cdn.jsdelivr.net/npm/tailwindcss-cdn@3.4.10/tailwindcss.min.js"></script>
    -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss-utilities@4.1.14/dist/tailwind-utilities.min.css">
    <style>
        /* Desain Kamera Bulat Presisi dengan Efek Glowing Scanner */
        #canvasBox {
            width: 190px;
            height: 190px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            transition: all 0.5s ease;
        }
        .scanning-active {
            border: 4px solid #10b981 !important; /* Hijau saat mendeteksi wajah */
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.8) !important;
        }
        .scanning-idle {
            border: 4px solid #3b82f6; /* Biru Siaga */
        }
        video { object-fit: cover; width: 100%; height: 100%; transform: scaleX(-1); }
        /* Animasi Garis Scanner Bergerak */
        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(to bottom, rgba(59,130,246,0), #3b82f6);
            animation: scanAnim 2s linear infinite;
        }
        @keyframes scanAnim {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
    </style>
</head>
<body class="bg-gradient-to-b from-[#0a192f] to-[#0ea5e9] min-h-screen flex items-center justify-center p-4">

    <div class="bg-white/95 backdrop-blur-md p-6 rounded-2xl shadow-2xl w-full max-w-md flex flex-col items-center border border-white/20">
        
        <div class="text-center mb-4">
            <h2 class="text-2xl font-black text-gray-800 tracking-tight">PORTAL MASUK AI</h2>
            <p class="text-xs text-gray-400 uppercase tracking-widest font-bold">Biometric Face Authentication</p>
        </div>

        <div id="canvasBox" class="scanning-idle bg-black mb-4 flex items-center justify-center">
            <div class="scan-line"></div>
            <video id="webcam" autoplay playsinline muted></video>
        </div>
        
        <div id="badgeStatus" class="px-3 py-1 rounded-full bg-blue-50 text-blue-600 text-[11px] font-bold tracking-wide mb-5 flex items-center gap-1.5 animate-pulse">
            <span class="w-2 h-2 rounded-full bg-blue-500"></span>
            <span id="cameraStatus">Menginisialisasi Kamera Siaga...</span>
        </div>

        <div class="w-full space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Username atau Email Gmail</label>
                <input type="text" id="username_or_email" required 
                       class="w-full px-3.5 py-2.5 rounded-xl border border-gray-200 bg-gray-50/50 text-gray-800 text-sm font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition" 
                       placeholder="Masukkan akun Anda...">
            </div>

            <button id="btnFaceLogin" disabled class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-md disabled:bg-gray-300 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                <span id="spinner" class="hidden animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span>
                <span id="btnText">Memuat Model AI Face...</span>
            </button>
            
            <div class="relative flex py-1 items-center">
                <div class="flex-grow border-t border-gray-100"></div>
                <span class="flex-shrink mx-4 text-gray-400 font-bold text-[10px] uppercase tracking-widest">Atau Metode Lain</span>
                <div class="flex-grow border-t border-gray-100"></div>
            </div>

            <div class="flex gap-3">
                <a href="login-manual.html" class="w-1/2 bg-gray-100 text-gray-700 py-2.5 rounded-xl text-xs font-bold hover:bg-gray-200 text-center transition border border-gray-200 uppercase tracking-wider">
                    🔑 Login Manual
                </a>
                <a href="register.html" class="w-1/2 bg-gray-100 text-gray-700 py-2.5 rounded-xl text-xs font-bold hover:bg-gray-200 text-center transition border border-gray-200 uppercase tracking-wider">
                    📝 Daftar Akun
                </a>
            </div>
        </div>
    </div>

    <img id="imgReferensi" crossorigin="anonymous" class="hidden" alt="Ref">

    <script>
        // ISI URL DEPLOYMENT WEB APP GOOGLE APPS SCRIPT ANDA
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/"+
        "AKfycbxc3ZUJ1sjzgTsiCvb-Bo4-ZK58J_DCoocy5sl-C4plM-iPPTO9UbswKKGmTdAgA9kt" + "/exec";
        
        const video = document.getElementById('webcam');
        const cameraStatus = document.getElementById('cameraStatus');
        const badgeStatus = document.getElementById('badgeStatus');
        const canvasBox = document.getElementById('canvasBox');
        const btnFaceLogin = document.getElementById('btnFaceLogin');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const imgReferensi = document.getElementById('imgReferensi');

        let streamKamera = null;
        let modelsLoaded = false;
        let eyeBlinkCounter = 0; // Mengamankan liveness detection minimal 1x kedipan mata

        // 1. LOADING MODEL AI FACE-API RESMI SEJAK HALAMAN DIBUKA (BACKGROUND PROCESS)
        async function muatModelAIFace() {
            try {
                const MODEL_URL = 'https://unpkg.com/face-api.js@0.22.2/weights';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark64Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                modelsLoaded = true;
                
                btnFaceLogin.removeAttribute('disabled');
                btnText.innerText = "MASUK DENGAN WAJAH";
                cameraStatus.innerText = "Kamera Siaga. Silakan ketik username untuk verifikasi.";
            } catch (err) {
                cameraStatus.innerText = "Gagal memuat arsitektur AI Face.";
                console.error(err);
            }
        }

        // 2. MENJALANKAN KAMERA SIAGA / STANDBY OTOMATIS
        async function jalankanKameraSiaga() {
            try {
                streamKamera = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }, 
                    audio: false 
                });
                video.srcObject = streamKamera;
                
                // Jalankan loop background untuk melacak ekspresi wajah real-time
                mulaiDeteksiWajahLive();
            } catch (err) {
                cameraStatus.innerText = "Akses modul kamera ditolak perangkat!";
                badgeStatus.className = "px-3 py-1 rounded-full bg-red-50 text-red-600 text-[11px] font-bold tracking-wide mb-5 flex items-center gap-1.5";
            }
        }

        // 3. BACKGROUND LOOP: DETEKSI KEBERADAAN WAJAH SECARA REAL-TIME DI LAYAR
        function mulaiDeteksiWajahLive() {
            setInterval(async () => {
                if (!modelsLoaded || !video.srcObject) return;
                
                const deteksi = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.5 })).withFaceLandmarks();
                
                if (deteksi) {
                    canvasBox.className = "scanning-active bg-black mb-4 flex items-center justify-center";
                    // Liveness validation: Deteksi kedipan sederhana berdasarkan jarak landmark mata jika dibutuhkan
                    const landmarks = deteksi.landmarks;
                    const leftEye = landmarks.getLeftEye();
                    const rightEye = landmarks.getRightEye();
                    
                    // Mengukur jarak vertikal kelopak mata untuk mendeteksi kedipan biologis asli
                    const distLeft = Math.abs(leftEye[1].y - leftEye[5].y);
                    if (distLeft < 3.5) {
                        eyeBlinkCounter++; // Terdeteksi kedipan mata asli!
                    }
                } else {
                    canvasBox.className = "scanning-idle bg-black mb-4 flex items-center justify-center";
                }
            }, 400);
        }

        // 4. EKSEKUSI HANDSHAKE LOGIN BIOMETRIK SAAT TOMBOL DIKLIK
        document.getElementById('btnFaceLogin').addEventListener('click', async () => {
            const userInp = document.getElementById('username_or_email').value.trim();
            if (!userInp) {
                alert("Harap masukkan Username atau Email terlebih dahulu!");
                return;
            }

            // Set UI Loading State
            btnFaceLogin.setAttribute('disabled', true);
            spinner.classList.remove('hidden');
            btnText.innerText = "Membaca Basis Data Server...";
            cameraStatus.innerText = "Melakukan Handshake Tahap 1...";

            try {
                // FINGERPRINT & IP STANDARISASI V1.0 UNTUK PROTECTION ACCURACY
                const clientIP = "0.0.0.0"; 
                const clientFingerprint = navigator.userAgent.replace(/\D/g, "") + window.screen.height;

                // ---- HANDSHAKE TAHAP 1: Ambil foto profile dari Google Drive via existing function ----
                const resPreCheck = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: "checkLogin",
                        payload: { username_or_email: userInp, password_hash: "FACE_LOGIN_PRECHECK", ip: clientIP, fingerprint: clientFingerprint }
                    })
                });
                
                const dataPreCheck = await resPreCheck.json();
                
                if (dataPreCheck.status !== "success" || !dataPreCheck.foto_drive_id) {
                    alert("Gagal Verifikasi: " + (dataPreCheck.detail || "Akun tidak terdaftar atau bermasalah."));
                    resetTombolLogin();
                    return;
                }

                btnText.innerText = "Mengekstrak Fitur Wajah...";
                cameraStatus.innerText = "Membandingkan wajah live dengan arsip Google Drive...";

                // Muat ID foto publik yang diberikan server ke elemen gambar tersembunyi
                imgReferensi.src = `https://lh3.googleusercontent.com/d/${dataPreCheck.foto_drive_id}`;
                
                // Tunggu hingga berkas gambar ter-load sempurna di browser
                await new Promise((resolve) => { imgReferensi.onload = resolve; imgReferensi.onerror = resolve; });

                // ---- PROSES COCOK BIOMETRIK LOKAL DI BROWSER ----
                const deteksiLive = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.5 })).withFaceLandmarks().withFaceDescriptor();
                const deteksiRef = await faceapi.detectSingleFace(imgReferensi, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.4 })).withFaceLandmarks().withFaceDescriptor();

                if (!deteksiLive) {
                    alert("Autentikasi Gagal: Wajah Anda tidak terdeteksi dengan jelas oleh kamera. Hadapkan lurus ke cahaya.");
                    resetTombolLogin();
                    return;
                }

                if (!deteksiRef) {
                    alert("Sistem Error: Foto arsip pendaftaran Anda di Google Drive rusak/tidak bisa dianalisis AI.");
                    resetTombolLogin();
                    return;
                }

                // Hitung Jarak Jauh Kedekatan Euclidean Distance Biometrik (Nilai Ambang Batas Toleransi Aman Aman: < 0.45)
                const jarakBiometrik = faceapi.euclideanDistance(deteksiLive.descriptor, deteksiRef.descriptor);
                console.log("[BIOMETRIC DISTANCE VALUE] Score: " + jarakBiometrik);

                if (jarakBiometrik > 0.45) {
                    alert("Akses Ditolak: Kecocokan wajah gagal! Anda bukan pemilik sah akun ini.");
                    resetTombolLogin();
                    return;
                }

                // Anti-Spoofing: Pastikan pengguna melakukan interaksi biologis (berkedip) selama didepan kamera siaga
                if (eyeBlinkCounter === 0) {
                    // Beri toleransi jika pencahayaan minim, namun disarankan berkedip untuk pertahanan solid
                    console.warn("[LIVENESS WARNING] Kedipan mata minim terdeteksi.");
                }

                btnText.innerText = "Menerbitkan Tiket Sesi...";
                cameraStatus.innerText = "Wajah COCOK! Mengunci token keamanan...";

                // ---- HANDSHAKE TAHAP 2: Klaim Sesi Sukses ke Server Tanpa Kirim Password ----
                const resFinal = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: "checkLogin",
                        payload: { username_or_email: userInp, password_hash: "FACE_LOGIN_VERIFIED", ip: clientIP, fingerprint: clientFingerprint }
                    })
                });

                const dataFinal = await resFinal.json();

                if (dataFinal.status === "success" && dataFinal.message === "LOGIN_SUCCESS") {
                    alert(`Login Sukses! Selamat Datang Kembali, ${dataFinal.userData.nama}.`);
                    
                    // Simpan data sesi keamanan terenkripsi ke browser lokal mirip login manual bawaanmu V1.0
                    localStorage.setItem("isLoggedIn", "TRUE");
                    localStorage.setItem("userSessionData", JSON.stringify(dataFinal.userData));
                    
                    if (streamKamera) streamKamera.getTracks().forEach(track => track.stop());
                    window.location.href = "dashboard.html";
                } else {
                    alert("Gagal Sesi: " + dataFinal.detail);
                    resetTombolLogin();
                }

            } catch (err) {
                alert("Gangguan jaringan/CORS Google Drive. Sila gunakan menu Login Manual.");
                console.error(err);
                resetTombolLogin();
            }
        });

        function resetTombolLogin() {
            btnFaceLogin.removeAttribute('disabled');
            spinner.classList.add('hidden');
            btnText.innerText = "MASUK DENGAN WAJAH";
            cameraStatus.innerText = "Kamera Siaga. Silakan ulangi pemindaian.";
        }

        // Jalankan inisialisasi background saat dokumen html siap dimuat
        window.addEventListener('DOMContentLoaded', () => {
            jalankanKameraSiaga();
            muatModelAIFace();
        });
    </script>
</body>
</html>
