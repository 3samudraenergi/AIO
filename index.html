<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Masuk Karyawan</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        #canvasBox {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #3b82f6;
            position: relative;
        }
        video, img {
            object-fit: cover;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-md w-full max-w-md flex flex-col items-center">
        
        <!-- =================================================== -->
        <!-- AREA UTAMA: KAMERA / FOTO (SELALU DI ATAS)          -->
        <!-- =================================================== -->
        <div id="canvasBox" class="bg-gray-200 mb-4 flex items-center justify-center">
            <video id="webcam" autoplay playsinline></video>
            <img id="photoPreview" class="hidden" alt="Preview">
        </div>
        <p id="cameraStatus" class="text-xs text-gray-500 mb-6 text-center">Menyiapkan kamera untuk pengenalan wajah...</p>

        <!-- =================================================== -->
        <!-- TAMPILAN 1: MENU UTAMA AWAL (DEFAULT)               -->
        <!-- =================================================== -->
        <div id="menuAwalBox" class="w-full space-y-3">
            <button id="btnFaceLogin" class="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                Masuk dengan Wajah
            </button>
            <div class="flex gap-2">
                <button id="lnkKeLoginManual" class="w-1/2 bg-gray-200 text-gray-700 p-2.5 rounded-lg text-sm font-medium hover:bg-gray-300 text-center transition">
                    Login Manual
                </button>
                <button id="lnkKeDaftar" class="w-1/2 bg-gray-200 text-gray-700 p-2.5 rounded-lg text-sm font-medium hover:bg-gray-300 text-center transition">
                    Daftar Akun
                </button>
            </div>
        </div>

        <!-- =================================================== -->
        <!-- TAMPILAN 2: FORM LOGIN MANUAL (USERNAME / GMAIL)    -->
        <!-- =================================================== -->
        <div id="loginManualBox" class="w-full hidden space-y-4">
            <h3 class="text-lg font-bold text-gray-800 text-center">Login Username / Gmail</h3>
            <form id="loginForm" class="space-y-3">
                <div>
                    <label class="block text-xs font-medium text-gray-600">Username atau Email Gmail</label>
                    <input type="text" id="login_user" required class="mt-1 w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600">Password</label>
                    <input type="password" id="login_pass" required class="mt-1 w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-2.5 rounded-lg font-semibold hover:bg-blue-700 transition">Masuk</button>
            </form>
            <button id="btnKembaliDariLogin" class="w-full text-xs text-blue-600 hover:underline text-center block mt-2">← Kembali ke Pilihan Utama</button>
        </div>

        <!-- =================================================== -->
        <!-- TAMPILAN 3: FORM PENDAFTARAN (REGISTER)             -->
        <!-- =================================================== -->
        <div id="registerBox" class="w-full hidden space-y-4">
            <h3 class="text-lg font-bold text-gray-800 text-center">Form Pendaftaran Baru</h3>
            <div class="text-center">
                <button type="button" id="btnAmbilFoto" class="bg-green-600 text-white text-xs px-4 py-1.5 rounded-full hover:bg-green-700 transition">
                    Kunci Foto Profil Anda
                </button>
            </div>
            
            <form id="registerForm" class="space-y-3">
                <div>
                    <label class="block text-xs font-medium text-gray-600">No. Karyawan</label>
                    <input type="text" id="no_karyawan" required class="mt-1 w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600">Nama Lengkap</label>
                    <input type="text" id="nama" required class="mt-1 w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600">No. Telepon / WA</label>
                    <input type="tel" id="no_telepon" required class="mt-1 w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600">Email Gmail</label>
                    <div class="flex gap-2 mt-1">
                        <input type="email" id="email" required class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                        <button type="button" id="btnKirimOTP" class="bg-blue-600 text-white text-xs px-3 rounded-lg hover:bg-blue-700 transition whitespace-nowrap">Kirim OTP</button>
                    </div>
                </div>
                <div id="otpBox" class="hidden">
                    <label class="block text-xs font-medium text-blue-600">Masukkan 6 Digit OTP</label>
                    <input type="text" id="otp_code" maxlength="6" class="mt-1 w-full p-2 border border-blue-400 rounded-lg bg-blue-50 text-center font-bold tracking-widest text-lg outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600">Username</label>
                    <input type="text" id="username" required class="mt-1 w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600">Password</label>
                    <input type="password" id="password" required class="mt-1 w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                </div>

                <button type="submit" id="btnDaftar" class="w-full bg-gray-400 text-white p-3 rounded-lg font-semibold transition mt-2" disabled>Daftar Akun</button>
            </form>
            <button id="btnKembaliDariDaftar" class="w-full text-xs text-blue-600 hover:underline text-center block mt-2">← Batal dan Kembali</button>
        </div>

    </div>

    <script>
        // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxot-8n5vO8HRk8FXUdr8QZ3QMPmqyILogD9cHgLo_UFp1E10mt_Me5GH-y-FDiST8/exec";

        const video = document.getElementById('webcam');
        const photoPreview = document.getElementById('photoPreview');
        const cameraStatus = document.getElementById('cameraStatus');
        
        // Kotak Navigasi Antarmuka
        const menuAwalBox = document.getElementById('menuAwalBox');
        const loginManualBox = document.getElementById('loginManualBox');
        const registerBox = document.getElementById('registerBox');

        // Tombol Aksi Kontrol
        const btnAmbilFoto = document.getElementById('btnAmbilFoto');
        let fotoBase64 = "";
        let localStream = null;

        // --- SISTEM AKSES KAMERA OTOMATIS SEJAK AWAL BUKA ---
        async function jalankanKamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = localStream;
                video.classList.remove('hidden');
                photoPreview.classList.add('hidden');
                cameraStatus.innerText = "Kamera aktif. Silakan pilih metode di bawah.";
            } catch (err) {
                cameraStatus.innerText = "Gagal memuat kamera. Izinkan izin kamera di browser Anda.";
                alert("Akses kamera ditolak/gagal: " + err.message);
            }
        }
        
        // Jalankan kamera langsung saat halaman dimuat
        window.addEventListener('DOMContentLoaded', jalankanKamera);

        // --- ENKRIPSI PASSWORD SHA-256 ---
        async function sha256(string) {
            const utf8 = new TextEncoder().encode(string);
            const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // --- NAVIGASI ANTARMUKA DINAMIS ---
        document.getElementById('lnkKeLoginManual').addEventListener('click', () => {
            menuAwalBox.classList.add('hidden');
            registerBox.classList.add('hidden');
            loginManualBox.classList.remove('hidden');
            resetKameraUlang();
        });

        document.getElementById('lnkKeDaftar').addEventListener('click', () => {
            menuAwalBox.classList.add('hidden');
            loginManualBox.classList.add('hidden');
            registerBox.classList.remove('hidden');
            resetKameraUlang();
        });

        function keMenuUtama() {
            loginManualBox.classList.add('hidden');
            registerBox.classList.add('hidden');
            menuAwalBox.classList.remove('hidden');
          resetKameraUlang();}
      document.getElementById('btnKembaliDariLogin').addEventListener('click',keMenuUtama);
      document.getElementById('btnKembaliDariDaftar').addEventListener('click', keMenuUtama);
      function resetKameraUlang() {
        fotoBase64 = "";photoPreview.classList.add('hidden');
        video.classList.remove('hidden');btnAmbilFoto.innerText = "Kunci Foto Profil Anda";
        btnAmbilFoto.className = "bg-green-600 text-white text-xs px-4 py-1.5 rounded-full hover:bg-green-700 transition";
        if (!video.srcObject && localStream) {
          jalankanKamera();}}
      // --- PROSES PENGAMBILAN FOTO SAAT REGISTRASI ---
      btnAmbilFoto.addEventListener('click', () => {if (video.classList.contains('hidden')) {
        // Jika sedang preview foto, klik ulang berarti mau foto 
        kembaliresetKameraUlang();
        return;}
              
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        fotoBase64 = canvas.toDataURL('image/jpeg');
        photoPreview.src = fotoBase64;video.classList.add('hidden');
        photoPreview.classList.remove('hidden');
        btnAmbilFoto.innerText = "Ambil Ulang Foto";
        btnAmbilFoto.className = "bg-orange-500 text-white text-xs px-4 py-1.5 rounded-full hover:bg-orange-600 transition";});
      // --- SISTEM VERIFIKASI OTP EMAIL VIA BACKEND ---
      document.getElementById('btnKirimOTP').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        if(!email) return alert("Mohon masukkan email Gmail Anda!");
        document.getElementById('btnKirimOTP').innerText = "Mengirim...";
        try {
          const response = await fetch(APPS_SCRIPT_URL, {method: 'POST',body: JSON.stringify({ action: 'sendOTP', email: email })});
          const result = await response.json();
          if (result.status === "SUCCESS") {
            alert(result.message);document.getElementById('otpBox').classList.remove('hidden');
            const btnDaftar = document.getElementById('btnDaftar');
            btnDaftar.removeAttribute('disabled');
            btnDaftar.className = "w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700 transition mt-2";} 
          else {alert(result.message);}} 
        catch (error) {
          alert("Gagal terhubung ke Apps Script: " + error.message);} 
        finally {document.getElementById('btnKirimOTP').innerText = "Kirim OTP";}});
      
      // --- PROSES REGISTER SUBMIT ---
      document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if(!fotoBase64) return alert("Wajib mengambil foto profil di dalam lingkaran terlebih dahulu!");
        const passwordMentah = document.getElementById('password').value;
        const passwordHashed = await sha256(passwordMentah);
        const payload = {
          action: 'register',
          no_karyawan: document.getElementById('no_karyawan').value,
          nama: document.getElementById('nama').value,
          no_telepon: document.getElementById('no_telepon').value,
          email: document.getElementById('email').value,
          otp: document.getElementById('otp_code').value,
          username: document.getElementById('username').value,
          password_hash: passwordHashed,
          fotoBase64: fotoBase64};
        document.getElementById('btnDaftar').innerText = "Mendaftarkan...";
        document.getElementById('btnDaftar').setAttribute('disabled', true);
        try {
          const response = await fetch(APPS_SCRIPT_URL, {method: 'POST',body: JSON.stringify(payload)});
          const result = await response.json();
          if (result.status === "SUCCESS") {
            alert(result.message);
            document.getElementById('registerForm').reset();
            keMenuUtama();} 
          else {alert(result.message);}} 
        catch (error) {
          alert("Error pendaftaran: " + error.message);} 
        finally {document.getElementById('btnDaftar').innerText = "Daftar Akun";
                 document.getElementById('btnDaftar').removeAttribute('disabled');}});
      
      // --- LOGIK LOG IN MANUAL (PONDASI AWAL TAHAP 2) ---
      document.getElementById('loginForm').addEventListener('submit', (e) => {e.preventDefault();                                                                              alert("Sistem validasi Login Manual sedang dipersiapkan untuk langkah berikutnya!");});
      
      // --- LOGIK LOG IN WAJAH (PONDASI AWAL TAHAP 2) ---
      document.getElementById('btnFaceLogin').addEventListener('click', () => {alert("Sistem Face Recognition menggunakan library face-api.js sedang dipersiapkan untuk langkah berikutnya!");});
