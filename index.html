      // Simpan OTP baru beserta waktu saat ini
      otpSheet.appendRow([email, otpCode, new Date()]);
      
      // Kirim email OTP menggunakan GmailApp
      MailApp.sendEmail({
        to: email,
        subject: "Kode Verifikasi Pendaftaran Website Karyawan",
        htmlBody: `<h3>Halo,</h3><p>Kode OTP pendaftaran Anda adalah: <b>${otpCode}</b></p><p>Kode ini berlaku selama 5 menit.</p>`
      });
      
      return ContentService.createTextOutput(JSON.stringify({ status: "SUCCESS", message: "OTP terkirim ke email." }))
        .setMimeType(ContentService.MimeType.JSON)
        .setHeaders(corsHeaders);
    }

    // === AKSI 2: PROSES PENDAFTARAN (REGISTER) ===
    if (action === "register") {
      const userSheet = ss.getSheetByName("User_Database");
      const otpSheet = ss.getSheetByName("OTP_Codes");
      
      // Cek validasi OTP terlebih dahulu
      const otpData = otpSheet.getDataRange().getValues();
      let isOtpValid = false;
      let otpRowIndex = -1;
      
      for (let i = 1; i < otpData.length; i++) {
        if (otpData[i][0] === requestData.email && otpData[i][1] === requestData.otp) {
          // Opsional: Cek jika expired (misal > 5 menit) bisa ditambahkan di sini
          isOtpValid = true;
          otpRowIndex = i + 1;
          break;
        }
      }
      
      if (!isOtpValid) {
        return ContentService.createTextOutput(JSON.stringify({ status: "ERROR", message: "Kode OTP salah atau kedaluwarsa!" }))
          .setMimeType(ContentService.MimeType.JSON)
          .setHeaders(corsHeaders);
      }

      // Cek apakah username atau no_karyawan sudah terdaftar
      const userData = userSheet.getDataRange().getValues();
      for (let i = 1; i < userData.length; i++) {
        if (userData[i][1] === requestData.no_karyawan) {
          return ContentService.createTextOutput(JSON.stringify({ status: "ERROR", message: "Nomor Karyawan sudah terdaftar!" })).setMimeType(ContentService.MimeType.JSON).setHeaders(corsHeaders);
        }
        if (userData[i][5] === requestData.username) {
          return ContentService.createTextOutput(JSON.stringify({ status: "ERROR", message: "Username sudah digunakan!" })).setMimeType(ContentService.MimeType.JSON).setHeaders(corsHeaders);
        }
      }

      // Proses upload foto profil berbentuk Base64 ke Google Drive
      let fotoDriveId = "";
      if (requestData.fotoBase64) {
        const folder = DriveApp.getFolderById(FOLDER_FOTO_ID);
        const contentData = requestData.fotoBase64.split(",")[1];
        const blob = Utilities.newBlob(Utilities.base64Decode(contentData), "image/jpeg", `foto_${requestData.username}.jpg`);
        const file = folder.createFile(blob);
        fotoDriveId = file.getId();
      }

      // Hitung nomor urut auto-increment
      const lastRow = userSheet.getLastRow();
      const noUrut = lastRow === 1 ? 1 : Number(userSheet.getRange(lastRow, 1).getValue()) + 1;

      // Masukkan data baru ke tabel User_Database
      userSheet.appendRow([
        noUrut,
        requestData.no_karyawan,
        requestData.nama,
        requestData.no_telepon,
        requestData.email,
        requestData.username,
        requestData.password_hash, // Password yang sudah di-hash SHA256 dari Frontend
        requestData.face_descriptor || "", // Data koordinat wajah (kosongkan jika belum implementasi library wajah)
        fotoDriveId,
        false, // status_approved awal mula FALSE
        false, // status_blocked awal mula FALSE
        5      // Default level pendaftar baru adalah level paling bawah (Level 5)
      ]);

      // Hapus OTP yang sudah sukses digunakan agar bersih
      otpSheet.deleteRow(otpRowIndex);

      return ContentService.createTextOutput(JSON.stringify({ status: "SUCCESS", message: "Pendaftaran berhasil! Menunggu approval Admin Master." }))
        .setMimeType(ContentService.MimeType.JSON)
        .setHeaders(corsHeaders);
    }

  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({ status: "ERROR", message: error.toString() }))
      .setMimeType(ContentService.MimeType.JSON)
      .setHeaders(corsHeaders);
  }
}
Use code with caution.Ganti teks "MASUKKAN_ID_FOLDER_DRIVE_ANDA_DISINI" di baris paling atas dengan ID Folder Drive yang sudah Anda catat tadi.Klik tombol Simpan (ikon Disket).Gelar Aplikasi Web (Deploy):Klik tombol Terapkan (Deploy) di pojok kanan atas > Pilih Terapkan baru (New deployment).Pilih jenis ekstensi dengan klik ikon Gerigi > Aplikasi web (Web app).Isi deskripsi secara bebas (misal: v1).Ubah bagian Yang memiliki akses (Who has access) menjadi Siapa saja (Anyone). Ini krusial agar GitHub frontend bisa mengirim data.Klik Terapkan (Deploy).Berikan izin akses (Authorize Access) jika diminta oleh akun Google Anda.Jika sudah selesai, Anda akan mendapatkan URL Aplikasi Web. Salin dan simpan URL tersebut. Formatnya mirip seperti: https://google.com.Langkah 3: Buat Frontend di GitHub PagesKita akan membuat satu halaman web sederhana khusus pendaftaran yang responsif menggunakan kamera, yang bisa melakukan enkripsi SHA-256 pada password sebelum dikirim.Buka akun GitHub Anda.Buat sebuah repositori (Repository) baru. Beri nama bebas, misal: app-karyawan. Setel menjadi Public.Di dalam repositori tersebut, buat file baru bernama index.html (Halaman ini akan menjadi struktur dasar form pendaftaran). Isi file tersebut dengan kode di bawah ini:html<!DOCTYPE html>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <script>
        // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
        const APPS_SCRIPT_URL = "PASANG_URL_APPS_SCRIPT_DI_SINI";

        const video = document.getElementById('webcam');
        const photoPreview = document.getElementById('photoPreview');
        const placeholderText = document.getElementById('placeholderText');
        const btnKamera = document.getElementById('btnKamera');
        const btnAmbilFoto = document.getElementById('btnAmbilFoto');
        let fotoBase64 = "";

        // Fungsi enkripsi SHA-256 bawaan JavaScript browser (SubtleCrypto)
        async function sha256(string) {
            const utf8 = new TextEncoder().encode(string);
            const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Kontrol Kamera Profil
        btnKamera.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
                video.classList.remove('hidden');
                placeholderText.classList.add('hidden');
                photoPreview.classList.add('hidden');
                btnKamera.classList.add('hidden');
                btnAmbilFoto.classList.remove('hidden');
            } catch (err) {
                alert("Gagal mengakses kamera: " + err.message);
            }
        });

        btnAmbilFoto.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            fotoBase64 = canvas.toDataURL('image/jpeg');
            photoPreview.src = fotoBase64;
            
            // Hentikan aliran kamera
            const stream = video.srcObject;
            const tracks = stream.getTracks();
            tracks.forEach(track => track.stop());

            video.classList.add('hidden');
            photoPreview.classList.remove('hidden');
            btnAmbilFoto.classList.add('hidden');
            btnKamera.classList.remove('hidden');
            btnKamera.innerText = "Ulang Foto";
        });

        // Aksi Kirim OTP ke Email pendaftar
        document.getElementById('btnKirimOTP').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            if(!email) return alert("Mohon isi alamat email terlebih dahulu!");

            document.getElementById('btnKirimOTP').innerText = "Mengirim...";
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'sendOTP', email: email })
                });
                const result = await response.json();
                
                if (result.status === "SUCCESS") {
                    alert(result.message);
                    document.getElementById('otpBox').classList.remove('hidden');
                    const btnDaftar = document.getElementById('btnDaftar');
                    btnDaftar.removeAttribute('disabled');
                    btnDaftar.className = "w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700 transition mt-4";
                } else {
                    alert(result.message);
                }
            } catch (error) {
                alert("Koneksi gagal ke server backend: " + error.message);
            } finally {
                document.getElementById('btnKirimOTP').innerText = "Kirim OTP";
            }
        });

        // Aksi Submit Pendaftaran Akun Akhir
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!fotoBase64) return alert("Anda harus mengambil foto profil terlebih dahulu sebelum mendaftar!");

            const passwordMentah = document.getElementById('password').value;
            const passwordHashed = await sha256(passwordMentah); // Mengamankan password ke SHA-256

            const payload = {
                action: 'register',
                no_karyawan: document.getElementById('no_karyawan').value,
                nama: document.getElementById('nama').value,
                no_telepon: document.getElementById('no_telepon').value,
                email: document.getElementById('email').value,
                otp: document.getElementById('otp_code').value,
                username: document.getElementById('username').value,
                password_hash: passwordHashed,
                fotoBase64: fotoBase64
            };

            document.getElementById('btnDaftar').innerText = "Memproses Pendaftaran...";
            document.getElementById('btnDaftar').setAttribute('disabled', true);

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.status === "SUCCESS") {
                alert(result.message);
                  document.getElementById('registerForm').reset();
                  photoPreview.classList.add('hidden');
                  placeholderText.classList.remove('hidden');
                  document.getElementById('otpBox').classList.add('hidden');} 
                else {alert(result.message);}} 
            catch (error) {
              alert("Terjadi masalah pendaftaran: " + error.message);} 
            finally {document.getElementById('btnDaftar').innerText = "Daftar Akun";
                     document.getElementById('btnDaftar').removeAttribute('disabled');}});
