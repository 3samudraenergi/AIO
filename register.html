<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Karyawan Baru - Versi 1.1</title>
    <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <!-- 1. Script untuk mematikan peringatan console (taruh sebelum script tailwind) -->
    <script>
        const originalWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && args[0].includes('production')) return; // Memblokir pesan peringatan tailwind
            originalWarn.apply(console, args);
        };
    </script>
    <!-- 2. Memanggil script JIT Tailwind v3 kesukaan Anda -->
    <script src="https://cdn.jsdelivr.net/npm/tailwindcss-cdn@3.4.10/tailwindcss.min.js"></script>
    <!-- 
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    -->
    

    <style>
        #canvasBox {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #3b82f6;
            position: relative;
        }
        video, img { 
            object-fit: cover; 
            width: 100%; 
            height: 100%; 
        }
    </style>
</head>
<body class="bg-gradient-to-b from-[#0a192f] to-[#0ea5e9] min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-md my-8">
        <h3 class="text-xl font-bold text-gray-800 text-center mb-2">Formulir Karyawan Baru</h3>
        <p class="text-xs text-gray-500 text-center mb-6">[SYSTEM VERSION 1.1 - SECURE BIOMETRIC]</p>
        
        <div class="mb-6 text-center">
            <div id="canvasBox" class="mx-auto">
                <video id="webcam" autoplay muted playsinline></video>
            </div>
            <p id="cameraStatus" class="text-xs text-gray-500 mt-2">Menghubungkan ke hardware webcam...</p>
            
            <div class="mt-3 p-3 bg-gray-900/90 rounded-xl border border-blue-500/30 text-center max-w-xs mx-auto">
                <p id="livenessInstruction" class="text-xs font-bold text-cyan-400 animate-pulse uppercase tracking-wider">
                    Menunggu Model AI Siap...
                </p>
                <div class="w-full bg-gray-700 h-1.5 rounded-full mt-2 overflow-hidden">
                    <div id="livenessProgress" class="bg-gradient-to-r from-cyan-400 to-blue-500 h-full w-0 transition-all duration-300"></div>
                </div>
            </div>
        </div>

        <form id="formRegistrasi" class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-600">Alamat Email Perusahaan (Gmail)</label>
                <div class="flex gap-2 mt-1">
                    <input type="email" id="reg_email" required class="w-2/3 p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500">
                    <button type="button" id="btnKirimOTP" class="w-1/3 bg-blue-600 text-white text-xs font-medium rounded-lg hover:bg-blue-700 transition">Kirim OTP</button>
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-600">Kode Verifikasi OTP</label>
                <div class="flex gap-2 mt-1">
                    <input type="text" id="reg_otp" required placeholder="6 Digit" class="w-2/3 p-2.5 border border-gray-200 rounded-lg text-sm text-center tracking-widest focus:outline-none focus:border-blue-500">
                    <button type="button" id="btnVerifikasiOTP" class="w-1/3 bg-green-600 text-white text-xs font-medium rounded-lg hover:bg-green-700 transition">Verifikasi</button>
                </div>
            </div>

            <hr class="border-gray-100 my-2">

            <div>
                <label class="block text-xs font-medium text-gray-600">ID Username Unik</label>
                <input type="text" id="reg_user" required class="mt-1 w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-600">Nama Lengkap Sesuai KTP</label>
                <input type="text" id="reg_nama" required class="mt-1 w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-600">Kata Sandi Akun</label>
                <input type="password" id="reg_pass" required class="mt-1 w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500">
            </div>

            <button type="submit" id="btnSubmitForm" disabled class="w-full bg-gray-500 text-white p-3 rounded-xl text-sm font-medium transition cursor-not-allowed shadow-md">
                Submit Pendaftaran
            </button>
        </form>
    </div>

    <script>
        console.log("[VERSION CONTROL] Memuat register.html - Versi 1.1 (Liveness Terintegrasi)");

        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/"+
        "AKfycbxc3ZUJ1sjzgTsiCvb-Bo4-ZK58J_DCoocy5sl-C4plM-iPPTO9UbswKKGmTdAgA9kt" + "/exec";
               
        const video = document.getElementById('webcam');
        const cameraStatus = document.getElementById('cameraStatus');
        const btnDaftar = document.getElementById('btnSubmitForm');
        
        let streamKamera = null;
        let stepLiveness = 0; 
        let dataFotoWajah = { depan: "", kiri: "", kanan: "" };
        let eyeRatioBase = 0;
        let clientIP = "127.0.0.1";
        let clientFingerprint = "Local-Dev-Env";

        // 1. Jalankan Hardware Kamera Kecepatan Tinggi
        async function jalankanKamera() {
            try {
                streamKamera = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 }, audio: false });
                video.srcObject = streamKamera;
                cameraStatus.innerText = "Kamera Terhubung. Menginisialisasi Engine Kecerdasan Wajah...";
                setTimeout(muatModelAI, 1000);
            } catch (err) {
                cameraStatus.innerText = "Akses kamera gagal/ditolak oleh browser.";
            }
        }

        // 2. Load Model face-api.js dari Jaringan Distribusi CDN Publik
        async function muatModelAI() {
            const MODEL_URL = 'https://unpkg.com/face-api.js@0.22.2/models';
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                document.getElementById('livenessInstruction').innerText = "Silakan Hadapkan Wajah Lurus ke Kamera";
                stepLiveness = 1;
                perbaruiProgressBar();
                mulaiPemindaianLiveness();
            } catch (err) {
                document.getElementById('livenessInstruction').innerText = "Gagal memuat modul pengenal wajah.";
            }
        }

        function perbaruiProgressBar() {
            document.getElementById('livenessProgress').style.width = `${(stepLiveness / 5) * 100}%`;
        }

        // 3. Loop Pemindaian Interaktif & Kalkulasi Geometris Wajah
        async function mulaiPemindaianLiveness() {
            if (!video || video.paused || video.ended) return setTimeout(mulaiPemindaianLiveness, 200);

            const deteksi = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();

            if (deteksi) {
                const landmarks = deteksi.landmarks;
                const hidung = landmarks.getNosetip()[0];
                const rahangKiri = landmarks.getJawOutline()[0];
                const rahangKanan = landmarks.getJawOutline()[16];

                const jarakKeKiri = hidung.x - rahangKiri.x;
                const jarakKeKanan = rahangKanan.x - hidung.x;
                const rasioHadap = jarakKeKiri / jarakKeKanan;

                const { x, y, width, height } = deteksi.detection.box;

                if (stepLiveness === 1) {
                    if (rasioHadap >= 0.85 && rasioHadap <= 1.15) {
                        dataFotoWajah.depan = tangkapDanPotongCanvas(video, x, y, width, height);
                        document.getElementById('livenessInstruction').innerText = "Bagus! Sekarang Tengok ke KIRI";
                        stepLiveness = 2;
                        perbaruiProgressBar();
                        await delay(1500);
                    }
                } 
                else if (stepLiveness === 2) {
                    if (rasioHadap < 0.55) {
                        dataFotoWajah.kiri = tangkapDanPotongCanvas(video, x, y, width, height);
                        document.getElementById('livenessInstruction').innerText = "Bagus! Sekarang Tengok ke KANAN";
                        stepLiveness = 3;
                        perbaruiProgressBar();
                        await delay(1500);
                    }
                } 
                else if (stepLiveness === 3) {
                    if (rasioHadap > 1.8) {
                        dataFotoWajah.kanan = tangkapDanPotongCanvas(video, x, y, width, height);
                        document.getElementById('livenessInstruction').innerText = "Sempurna! Terakhir, SILAKAN BERKEDIP";
                        stepLiveness = 4;
                        perbaruiProgressBar();
                        eyeRatioBase = hitungRasioKelopakMata(landmarks);
                        await delay(1000);
                    }
                } 
                else if (stepLiveness === 4) {
                    const rasioMataSekarang = hitungRasioKelopakMata(landmarks);
                    if (rasioMataSekarang < eyeRatioBase * 0.72) {
                        document.getElementById('livenessInstruction').className = "text-xs font-bold text-green-500 uppercase tracking-wider";
                        document.getElementById('livenessInstruction').innerText = "Liveness Valid! Tombol Aktif.";
                        stepLiveness = 5;
                        perbaruiProgressBar();
                        
                        // Aktifkan tombol submit
                        btnDaftar.removeAttribute('disabled');
                        btnDaftar.className = "w-full bg-blue-600 text-white p-3 rounded-xl text-sm font-medium hover:bg-blue-700 transition shadow-md cursor-pointer";
                    }
                }
            }

            if (stepLiveness < 5) {
                requestAnimationFrame(mulaiPemindaianLiveness);
            }
        }

        function tangkapDanPotongCanvas(videoEl, x, y, w, h) {
            const canvasPotong = document.createElement('canvas');
            const ctx = canvasPotong.getContext('2d');
            canvasPotong.width = 200;
            canvasPotong.height = 200;
            ctx.drawImage(videoEl, x, y, w, h, 0, 0, 200, 200);
            return canvasPotong.toDataURL('image/jpeg', 0.85);
        }

        function hitungRasioKelopakMata(landmarks) {
            const mataKiri = landmarks.getLeftEye();
            const tinggiMata = Math.abs(mataKiri[1].y - mataKiri[5].y) + Math.abs(mataKiri[2].y - mataKiri[4].y);
            const lebarMata = Math.abs(mataKiri[0].x - mataKiri[3].x);
            return tinggiMata / (2.0 * lebarMata);
        }

        function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        // Metadata IP & OTP Trigger Handling Tetap Sama Sesuai V1.0
        async function ambilMetadataKlien() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                clientIP = data.ip;
                clientFingerprint = "Browser-" + btoa(navigator.userAgent).substring(0, 15);
            } catch (e) { console.log("Gagal ambil IP internet."); }
        }

        window.addEventListener('DOMContentLoaded', () => {
            jalankanKamera();
            ambilMetadataKlien();
        });

        // 4. Proses Submit Data Aman Terintegrasi Ke Apps Script
        document.getElementById('formRegistrasi').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                action: "registerUser",
                payload: {
                    email: document.getElementById('reg_email').value,
                    otp: document.getElementById('reg_otp').value,
                    username: document.getElementById('reg_user').value,
                    nama: document.getElementById('reg_nama').value,
                    password: document.getElementById('reg_pass').value,
                    foto: dataFotoWajah.depan, // Mengirimkan foto wajah lurus terbaik hasil auto-crop
                    ip: clientIP,
                    fingerprint: clientFingerprint
                }
            };

            btnDaftar.innerText = "Memproses Pendaftaran...";
            btnDaftar.setAttribute('disabled', true);
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload) 
                });
                const result = await response.json();
                
                if (result.status === "success") {
                    alert(result.message);
                    if (streamKamera) streamKamera.getTracks().forEach(track => track.stop());
                    window.location.href = "pending.html";
                } else { 
                    alert("Gagal: " + result.message); 
                    btnDaftar.innerText = "Submit Pendaftaran";
                    btnDaftar.removeAttribute('disabled');
                }
            } catch (err) { 
                if (streamKamera) streamKamera.getTracks().forEach(track => track.stop());
                window.location.href = "pending.html"; 
            }
        });
    </script>
</body>
</html>
