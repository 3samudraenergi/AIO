<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Karyawan Baru</title>
    <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        #canvasBox {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #3b82f6;
            position: relative;
        }
        video, img { object-fit: cover; width: 100%; height: 100%; }
    </style>
</head>
<body class="bg-gradient-to-b from-[#0a192f] to-[#0ea5e9] min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-md flex flex-col items-center">
        <h3 class="text-xl font-bold text-gray-800 text-center mb-4">Form Pendaftaran Baru</h3>
        
        <!-- Area Ambil Gambar Wajah -->
        <div id="canvasBox" class="bg-gray-200 mb-2 flex items-center justify-center">
            <video id="webcam" autoplay playsinline></video>
            <img id="photoPreview" class="hidden" alt="Preview">
        </div>
        <button type="button" id="btnAmbilFoto" class="mb-4 bg-green-600 text-white text-xs px-4 py-1.5 rounded-full hover:bg-green-700 transition shadow-sm">
            Kunci Foto Profil Anda
        </button>
        
        <form id="registerForm" class="w-full space-y-3">
            <div>
                <label class="block text-xs font-medium text-gray-600">No. Karyawan</label>
                <input type="text" id="no_karyawan" required class="mt-1 w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600">Nama Lengkap</label>
                <input type="text" id="nama" required class="mt-1 w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600">No. Telepon / WA</label>
                <input type="tel" id="no_telepon" required class="mt-1 w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600">Email Gmail</label>
                <div class="flex gap-2 mt-1">
                    <input type="email" id="email" required class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    <button type="button" id="btnKirimOTP" class="bg-blue-600 text-white text-xs px-3 rounded-lg hover:bg-blue-700 transition whitespace-nowrap">Kirim OTP</button>
                </div>
            </div>
            <div id="otpBox" class="hidden" style="display: none;">
                <label class="block text-xs font-medium text-blue-600">Masukkan 6 Digit OTP (Verified)</label>
                <input type="text" id="otp_code" maxlength="6" class="mt-1 w-full p-2 border border-blue-400 rounded-lg bg-blue-50 text-center font-bold tracking-widest text-lg outline-none">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600">Username</label>
                <input type="text" id="username" required class="mt-1 w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600">Password</label>
                <input type="password" id="password" required class="mt-1 w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <!-- Tombol Aksi Batal dan Submit -->
            <div class="flex gap-2 pt-2">
                <a href="index.html" class="w-1/2 bg-gray-200 text-gray-700 p-3 rounded-lg font-semibold hover:bg-gray-300 transition text-center">
                    Cancel
                </a>
                <button type="submit" id="btnDaftar" class="w-1/2 bg-gray-400 text-white p-3 rounded-lg font-semibold transition" disabled>
                    Submit
                </button>
            </div>
        </form>
    </div>

    <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQaY71eFhSkFL8g-XqBoNXGcbsNY5uhr9Fvoqkw74l7znErhee8vNW3DCkfDnhI_U-/exec";
        const video = document.getElementById('webcam');
        const photoPreview = document.getElementById('photoPreview');
        const btnAmbilFoto = document.getElementById('btnAmbilFoto');
        let fotoBase64 = "";

        async function jalankanKamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
            } catch (err) { alert("Kamera gagal dimuat."); }
        }
        window.addEventListener('DOMContentLoaded', jalankanKamera);

        async function sha256(string) {
            const utf8 = new TextEncoder().encode(string);
            const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        btnAmbilFoto.addEventListener('click', () => {
            if (video.classList.contains('hidden')) {
                fotoBase64 = ""; photoPreview.classList.add('hidden'); video.classList.remove('hidden');
                btnAmbilFoto.innerText = "Kunci Foto Profil Anda"; btnAmbilFoto.className = "mb-4 bg-green-600 text-white text-xs px-4 py-1.5 rounded-full hover:bg-green-700 transition shadow-sm";
                return;
            }
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640; canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            fotoBase64 = canvas.toDataURL('image/jpeg'); photoPreview.src = fotoBase64;
            video.classList.add('hidden'); photoPreview.classList.remove('hidden');
            btnAmbilFoto.innerText = "Ambil Ulang Foto"; btnAmbilFoto.className = "mb-4 bg-orange-500 text-white text-xs px-4 py-1.5 rounded-full hover:bg-orange-600 transition shadow-sm";
        });

        document.getElementById('btnKirimOTP').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            if(!email) return alert("Masukkan email!");
            document.getElementById('btnKirimOTP').innerText = "Mengirim...";
            try {
                // Perbaikan: Menambahkan headers text/plain agar kebal terhadap cekatan CORS browser
                const response = await fetch(APPS_SCRIPT_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'sendOTP', email: email }) 
                });
                const result = await response.json();
                if (result.status === "SUCCESS") {
                    alert(result.message);
                    document.getElementById('otpBox').classList.remove('hidden');
                    document.getElementById('otpBox').style.display = "block";
                    const btnDaftar = document.getElementById('btnDaftar');
                    btnDaftar.removeAttribute('disabled'); 
                    btnDaftar.className = "w-1/2 bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700 transition shadow-md";
                } 
                else { alert(result.message); }
            } catch (e) { 
                alert("Terjadi gangguan membaca respons, mohon cek kotak masuk email Gmail Anda dalam 1 menit!"); 
                document.getElementById('otpBox').classList.remove('hidden');
                document.getElementById('otpBox').style.display = "block";
                const btnDaftar = document.getElementById('btnDaftar');
                btnDaftar.removeAttribute('disabled'); 
                btnDaftar.className = "w-1/2 bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700 transition shadow-md"; 
            } finally { 
                document.getElementById('btnKirimOTP').innerText = "Kirim OTP"; 
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!fotoBase64) return alert("Ambil foto profil terlebih dahulu!");
            
            const passwordHashed = await sha256(document.getElementById('password').value);
            const payload = {
                action: 'register',
                no_karyawan: document.getElementById('no_karyawan').value,
                nama: document.getElementById('nama').value,
                no_telepon: document.getElementById('no_telepon').value,
                email: document.getElementById('email').value,
                otp: document.getElementById('otp_code').value,
                username: document.getElementById('username').value,
                password_hash: passwordHashed,
                fotoBase64: fotoBase64
            };

            document.getElementById('btnDaftar').innerText = "Proses...";
            try {
                const response = await fetch(APPS_SCRIPT_URL, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload) });
                const result = await response.json();
                if (result.status === "SUCCESS") {
                    // JIKA BERHASIL, DIALIKAN KE HALAMAN PENDING APPROVAL
                    window.location.href = "pending.html";
                } else { alert(result.message); }
            } catch (err) { 
                // Jika data berhasil masuk namun pembacaan JSON diblokir oleh redirect Google, dialihkan ke halaman sukses pending secara aman
                window.location.href = "pending.html"; 
            }
        });
    </script>
</body>
</html>
